name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  powershell:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\run-tests.ps1
